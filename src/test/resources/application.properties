spring.datasource.url=jdbc:h2:mem:pesapp-test;DB_CLOSE_DELAY=-1;MODE=MSSQLServer
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

app.cors.allowed-origins=http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,Accept,Origin
app.cors.allow-credentials=true

jwt.secret=test-secret-change-me-test-secret-change-me
jwt.expiration=900000
jwt.issuer=pesapp-test
app.auth.access-cookie-name=pesapp_access_token
app.auth.refresh-cookie-name=pesapp_refresh_token
app.auth.refresh-token-expiration=2592000000
app.auth.cookie-secure=false
app.auth.cookie-same-site=Lax
app.auth.cookie-domain=

app.initializer.enabled=false
app.initializer.default-user-name=Test
app.initializer.default-user-email=test@pesapp.local
app.initializer.default-user-username=
app.initializer.default-user-password=ChangeMe123!
app.initializer.default-user-role=ADMIN

spring.config.import=optional:file:.env[.properties]

spring.application.name=${APP_NAME:pesapp}
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pesapp?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Origin}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}

jwt.secret=${JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.issuer=${JWT_ISSUER:pesapp}

app.initializer.enabled=${DATA_INITIALIZER_ENABLED:true}
app.initializer.default-user-name=${DEFAULT_USER_NAME:Bryan}
app.initializer.default-user-email=${DEFAULT_USER_EMAIL:admin@pesapp.local}
app.initializer.default-user-password=${DEFAULT_USER_PASSWORD:ChangeMe123!}
app.initializer.default-user-role=${DEFAULT_USER_ROLE:ADMIN}
